version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16.2.2
  - React 19
  - Tailwind CSS 4
  - shadcn/ui
  - Drizzle ORM
  - better-auth
  - better-sqlite3
  - Recharts
  - jsPDF
  - lucide-react
routes:
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Login page with username (NIP/NIS) and password authentication
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Root page, redirects to login
  - path: /admin
    file: src/app/admin/page.tsx
    auth_required: true
    description: Admin dashboard with stats, weekly attendance chart, top 5 leaderboard
  - path: /admin/siswa
    file: src/app/admin/siswa/page.tsx
    auth_required: true
    description: Admin student management (CRUD, import/export)
  - path: /admin/guru
    file: src/app/admin/guru/page.tsx
    auth_required: true
    description: Admin teacher management (CRUD)
  - path: /admin/kelas
    file: src/app/admin/kelas/page.tsx
    auth_required: true
    description: Admin class management
  - path: /admin/mapel
    file: src/app/admin/mapel/page.tsx
    auth_required: true
    description: Admin subject management
  - path: /admin/absensi
    file: src/app/admin/absensi/page.tsx
    auth_required: true
    description: Admin attendance management
  - path: /admin/tahun-ajaran
    file: src/app/admin/tahun-ajaran/page.tsx
    auth_required: true
    description: Admin academic year management
  - path: /admin/spk
    file: src/app/admin/spk/page.tsx
    auth_required: true
    description: Admin SPK criteria weight configuration
  - path: /admin/leaderboard
    file: src/app/admin/leaderboard/page.tsx
    auth_required: true
    description: Admin leaderboard view with SPK calculation results
  - path: /admin/akun
    file: src/app/admin/akun/page.tsx
    auth_required: true
    description: Admin account management
  - path: /admin/profil
    file: src/app/admin/profil/page.tsx
    auth_required: true
    description: Admin profile page
  - path: /guru
    file: src/app/guru/page.tsx
    auth_required: true
    description: Teacher dashboard with class list and attendance status
  - path: /guru/absensi
    file: src/app/guru/absensi/page.tsx
    auth_required: true
    description: Teacher attendance recording for assigned classes
  - path: /guru/rekap
    file: src/app/guru/rekap/page.tsx
    auth_required: true
    description: Teacher attendance recap/report
  - path: /guru/nilai
    file: src/app/guru/nilai/page.tsx
    auth_required: true
    description: Teacher student grades/scores entry
  - path: /guru/profil
    file: src/app/guru/profil/page.tsx
    auth_required: true
    description: Teacher profile page
  - path: /siswa
    file: src/app/siswa/page.tsx
    auth_required: true
    description: Student dashboard with attendance stats, chart, and class leaderboard
  - path: /siswa/absensi
    file: src/app/siswa/absensi/page.tsx
    auth_required: true
    description: Student attendance history view
  - path: /siswa/leaderboard
    file: src/app/siswa/leaderboard/page.tsx
    auth_required: true
    description: Student class leaderboard view
  - path: /siswa/profil
    file: src/app/siswa/profil/page.tsx
    auth_required: true
    description: Student profile page
features:
  - name: User Login
    description: Login with username (NIP/NIS) and password, role-based redirect to admin/guru/siswa dashboard
    files:
      - src/app/login/page.tsx
      - src/lib/auth-client.ts
      - src/lib/auth.ts
    entry_route: /login
    user_interactions:
      - Fill NIP/NIS input field
      - Fill password input field
      - Toggle password visibility
      - Click Masuk button to submit
      - See error message on invalid credentials
      - Auto-redirect to role-specific dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/sign-in/username
    auth_required: false
  - name: Admin Dashboard
    description: Overview dashboard with total students, teachers, today attendance percentage, active semester, weekly attendance chart, and top 5 SPK leaderboard
    files:
      - src/app/admin/page.tsx
    entry_route: /admin
    user_interactions:
      - View stat cards (total siswa, guru, kehadiran hari ini, semester aktif)
      - View weekly attendance bar chart
      - Click quick action buttons (Import Siswa, Atur Bobot SPK, Lihat Leaderboard)
      - View top 5 leaderboard table
      - Click Lihat Semua to navigate to full leaderboard
    api_calls:
      - method: GET
        endpoint: /api/dashboard/stats
      - method: GET
        endpoint: /api/spk/calculate?kelas=umum
    auth_required: true
  - name: Student Management
    description: Admin can view, add, edit, delete students. Supports bulk import via Excel.
    files:
      - src/app/admin/siswa/page.tsx
    entry_route: /admin/siswa
    user_interactions:
      - View student list in table
      - Search students by name or NIS
      - Add new student via form dialog
      - Edit existing student
      - Delete student
      - Import students from Excel file
    api_calls:
      - method: GET
        endpoint: /api/students
      - method: POST
        endpoint: /api/students
      - method: PUT
        endpoint: /api/students/[id]
      - method: DELETE
        endpoint: /api/students/[id]
      - method: POST
        endpoint: /api/students/bulk
    auth_required: true
  - name: Teacher Management
    description: Admin can manage teacher data (CRUD operations)
    files:
      - src/app/admin/guru/page.tsx
    entry_route: /admin/guru
    user_interactions:
      - View teacher list
      - Add new teacher
      - Edit teacher data
      - Delete teacher
      - Search teachers
    api_calls:
      - method: GET
        endpoint: /api/teachers
      - method: POST
        endpoint: /api/teachers
      - method: PUT
        endpoint: /api/teachers/[id]
      - method: DELETE
        endpoint: /api/teachers/[id]
    auth_required: true
  - name: Attendance Recording (Guru)
    description: Teachers record daily attendance for their assigned classes
    files:
      - src/app/guru/absensi/page.tsx
    entry_route: /guru/absensi
    user_interactions:
      - Select class from dropdown
      - Select date
      - Mark attendance status (Hadir/Izin/Sakit/Alfa) for each student
      - Submit attendance
    api_calls:
      - method: GET
        endpoint: /api/attendance
      - method: POST
        endpoint: /api/attendance
    auth_required: true
  - name: SPK Configuration
    description: Admin configures criteria weights for the Student Performance Key (SPK) decision support system
    files:
      - src/app/admin/spk/page.tsx
    entry_route: /admin/spk
    user_interactions:
      - View SPK criteria list
      - Edit criteria weights
      - Save updated weights
    api_calls:
      - method: GET
        endpoint: /api/spk-criteria
      - method: PUT
        endpoint: /api/spk-criteria
    auth_required: true
  - name: Leaderboard
    description: View ranked students based on SPK calculation results
    files:
      - src/app/admin/leaderboard/page.tsx
      - src/app/siswa/leaderboard/page.tsx
    entry_route: /admin/leaderboard
    user_interactions:
      - View leaderboard table with rank, name, class, SPK score
      - Filter by class
      - Export to PDF
    api_calls:
      - method: GET
        endpoint: /api/spk/calculate
    auth_required: true
  - name: Student Dashboard
    description: Student views their own attendance stats, monthly chart, and class leaderboard
    files:
      - src/app/siswa/page.tsx
    entry_route: /siswa
    user_interactions:
      - View profile card with NIS, class, and avatar
      - View attendance percentage, total hadir, tidak hadir stats
      - View monthly attendance area chart
      - View top 5 class leaderboard
    api_calls:
      - method: GET
        endpoint: /api/students/me
      - method: GET
        endpoint: /api/students/me/attendance-stats
      - method: GET
        endpoint: /api/students/me/class-leaderboard
    auth_required: true
  - name: Teacher Dashboard
    description: Guru views assigned classes with attendance status
    files:
      - src/app/guru/page.tsx
    entry_route: /guru
    user_interactions:
      - View stat cards (total kelas, sudah diabsen, rata-rata kehadiran)
      - View assigned class cards with today's attendance status
      - Click Mulai Absensi to start recording attendance
      - Click Rekap to view attendance recap
    api_calls:
      - method: GET
        endpoint: /api/teachers/me/dashboard
    auth_required: true
known_limitations: []
